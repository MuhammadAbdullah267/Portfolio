<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Premium Loan Calculator</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>


<body>


    <div class="bubble b1"></div>
    <div class="bubble b2"></div>
    <div class="bubble b3"></div>



    <div class="container">


        <h1>
            <i class="fa-solid fa-credit-card"></i>
            Loan Calculator
        </h1>


        <div class="input-box">

            <label>
                Loan Amount ($)
            </label>

            <input oninput="calculateLoan()" class="input" type="number" id="loan-amount" value="10000">

        </div>



        <div class="input-box">

            <label>
                Interest Rate (%)
            </label>

            <input oninput="calculateLoan()" class="input" type="number" id="interest-rate" value="10" step=".1">

        </div>




        <div class="input-box">

            <label>
                Months To Pay
            </label>

            <input oninput="calculateLoan()" class="input" type="number" id="months-to-pay" value="12">

        </div>




        <div class="payment" id="payment">

            Monthly Payment: $0

        </div>



    </div>



    <script src="index.js"></script>


</body>

</html>
