<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pro English Dictionary</title>

<link rel="stylesheet" href="style.css">

</head>

<body>


<div class="bg-circle one"></div>
<div class="bg-circle two"></div>


<div class="container">

<h1 class="heading">
📖 English Dictionary
</h1>


<div class="search-box">

<input 
placeholder="Search a word..."
type="text"
class="input"
id="input"
/>

</div>


<p class="info-text" id="info-text">
Type a word and press Enter
</p>



<div class="meaning-container" id="meaning-container">


<h2>
Word:
<span id="title">---</span>
</h2>


<p class="meaning-text">
Meaning:
<span id="meaning">---</span>
</p>


<audio 
controls 
id="audio">
</audio>


</div>


</div>


<script src="index.js"></script>


</body>
</html>
